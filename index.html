<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  #app { padding: 1rem 0; min-height: 500px; }
  .screen { display: none; }
  .screen.active { display: block; }
  .header { text-align: center; margin-bottom: 1.5rem; }
  .header h1 { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
  .header p { font-size: 14px; color: var(--color-text-secondary); margin-top: 4px; }
  .score-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; font-size: 13px; color: var(--color-text-secondary); }
  .score-badge { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 4px 10px; font-weight: 500; color: var(--color-text-primary); }
  .progress-bar { height: 4px; background: var(--color-background-secondary); border-radius: 2px; margin-bottom: 1.25rem; }
  .progress-fill { height: 4px; background: #7F77DD; border-radius: 2px; transition: width 0.4s ease; }
  .cat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .cat-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem; cursor: pointer; text-align: center; transition: border-color 0.15s, transform 0.1s; }
  .cat-card:hover { border-color: var(--color-border-secondary); transform: scale(1.01); }
  .cat-card:active { transform: scale(0.97); }
  .cat-icon { font-size: 28px; margin-bottom: 6px; }
  .cat-name { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
  .cat-count { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
  .question-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
  .question-num { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 8px; }
  .question-text { font-size: 15px; font-weight: 500; color: var(--color-text-primary); line-height: 1.5; }
  .answers { display: flex; flex-direction: column; gap: 8px; }
  .answer-btn { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 12px 16px; text-align: left; font-size: 14px; color: var(--color-text-primary); cursor: pointer; transition: all 0.15s; line-height: 1.4; }
  .answer-btn:hover:not(:disabled) { border-color: var(--color-border-secondary); background: var(--color-background-secondary); }
  .answer-btn.correct { background: #EAF3DE; border-color: #639922; color: #3B6D11; }
  .answer-btn.wrong { background: #FCEBEB; border-color: #E24B4A; color: #A32D2D; }
  .answer-btn:disabled { cursor: default; }
  .feedback { border-radius: var(--border-radius-md); padding: 10px 14px; font-size: 13px; margin-top: 10px; display: none; line-height: 1.5; }
  .feedback.show { display: block; }
  .feedback.correct { background: #EAF3DE; color: #3B6D11; }
  .feedback.wrong { background: #FCEBEB; color: #A32D2D; }
  .next-btn { width: 100%; margin-top: 1rem; padding: 12px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); font-size: 14px; font-weight: 500; color: var(--color-text-primary); cursor: pointer; display: none; }
  .next-btn.show { display: block; }
  .next-btn:hover { background: var(--color-background-secondary); }
  .result-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.5rem; text-align: center; margin-bottom: 1rem; }
  .result-score { font-size: 48px; font-weight: 500; color: var(--color-text-primary); }
  .result-label { font-size: 14px; color: var(--color-text-secondary); margin-top: 4px; }
  .result-msg { font-size: 15px; color: var(--color-text-primary); margin-top: 1rem; font-weight: 500; }
  .result-emoji { font-size: 36px; margin-bottom: 8px; }
  .btn-row { display: flex; gap: 8px; }
  .btn-row button { flex: 1; padding: 12px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); font-size: 14px; color: var(--color-text-primary); cursor: pointer; }
  .btn-row button:hover { background: var(--color-background-secondary); }
  .btn-row .primary-btn { background: #534AB7; color: #EEEDFE; border-color: #534AB7; }
  .btn-row .primary-btn:hover { background: #7F77DD; border-color: #7F77DD; }
  .streak-badge { font-size: 12px; color: #854F0B; background: #FAEEDA; border-radius: var(--border-radius-md); padding: 3px 8px; }
  .diff-badge { font-size: 11px; padding: 2px 7px; border-radius: var(--border-radius-md); margin-left: 6px; }
  .diff-hard { background: #FCEBEB; color: #A32D2D; }
  .diff-medium { background: #FAEEDA; color: #854F0B; }
</style>

<div id="app">
  <div id="home" class="screen active">
    <div class="header">
      <h1>Culture Générale</h1>
      <p>Choisis une catégorie pour jouer</p>
    </div>
    <div class="cat-grid" id="cat-grid"></div>
  </div>
  <div id="quiz" class="screen">
    <div class="score-bar">
      <span id="cat-label" class="score-badge"></span>
      <span>Score : <strong id="score-display">0</strong></span>
      <span id="streak-display" class="streak-badge" style="display:none"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="question-card">
      <div class="question-num" id="question-num"></div>
      <div class="question-text" id="question-text"></div>
    </div>
    <div class="answers" id="answers"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Question suivante →</button>
  </div>
  <div id="result" class="screen">
    <div class="header"><h1>Résultat</h1></div>
    <div class="result-card">
      <div class="result-emoji" id="result-emoji"></div>
      <div class="result-score" id="result-score"></div>
      <div class="result-label" id="result-label"></div>
      <div class="result-msg" id="result-msg"></div>
    </div>
    <div class="btn-row">
      <button onclick="replayCategory()">Rejouer</button>
      <button class="primary-btn" onclick="goHome()">Autres catégories</button>
    </div>
  </div>
</div>

let currentCat = null, currentQuestions = [], currentQ = 0, score = 0, streak = 0, answered = false;

function goHome() { showScreen('home'); }
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function buildCatGrid() {
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = '';
  Object.entries(DATA).forEach(([key, cat]) => {
    const card = document.createElement('div');
    card.className = 'cat-card';
    card.innerHTML = `<div class="cat-icon">${cat.icon}</div><div class="cat-name">${cat.name}</div><div class="cat-count">${cat.questions.length} questions</div>`;
    card.onclick = () => startCategory(key);
    grid.appendChild(card);
  });
}

function startCategory(key) {
  currentCat = key;
  currentQuestions = [...DATA[key].questions].sort(() => Math.random() - 0.5);
  currentQ = 0; score = 0; streak = 0;
  document.getElementById('cat-label').textContent = DATA[key].icon + ' ' + DATA[key].name;
  showScreen('quiz');
  showQuestion();
}

function showQuestion() {
  const q = currentQuestions[currentQ];
  const total = currentQuestions.length;
  answered = false;
  document.getElementById('question-num').textContent = `Question ${currentQ + 1} / ${total}`;
  document.getElementById('question-text').textContent = q.q;
  document.getElementById('progress-fill').style.width = Math.round((currentQ / total) * 100) + '%';
  document.getElementById('score-display').textContent = score;
  const streakEl = document.getElementById('streak-display');
  if (streak >= 2) { streakEl.style.display = 'inline-block'; streakEl.textContent = '🔥 x' + streak; }
  else { streakEl.style.display = 'none'; }

  const answersDiv = document.getElementById('answers');
  answersDiv.innerHTML = '';
  const shuffled = q.a.map((text, i) => ({ text, i })).sort(() => Math.random() - 0.5);
  shuffled.forEach(({ text, i }) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.textContent = text;
    btn.dataset.index = i;
    btn.onclick = () => selectAnswer(i, q.correct, btn, q.expl, q.a[q.correct]);
    answersDiv.appendChild(btn);
  });

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').textContent = '';
  const nb = document.getElementById('next-btn');
  nb.className = 'next-btn';
  nb.textContent = currentQ < currentQuestions.length - 1 ? 'Question suivante →' : 'Voir les résultats →';
}

function selectAnswer(selected, correct, clickedBtn, expl, correctText) {
  if (answered) return;
  answered = true;
  const isCorrect = selected === correct;
  document.querySelectorAll('.answer-btn').forEach(btn => {
    btn.disabled = true;
    if (btn.textContent === correctText) btn.classList.add('correct');
  });
  if (!isCorrect) { clickedBtn.classList.add('wrong'); streak = 0; }
  else { score += (streak >= 2 ? 2 : 1); streak++; }
  const fb = document.getElementById('feedback');
  fb.className = 'feedback ' + (isCorrect ? 'correct' : 'wrong') + ' show';
  fb.textContent = (isCorrect ? '✓ Correct ! ' : '✗ Raté ! ') + expl;
  document.getElementById('next-btn').classList.add('show');
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= currentQuestions.length) showResult();
  else showQuestion();
}

function showResult() {
  const total = currentQuestions.length;
  const pct = Math.round((score / total) * 100);
  let emoji = '😐', msg = 'Pas mal, continue !';
  if (pct >= 80) { emoji = '🏆'; msg = 'Excellent ! Tu es un champion !'; }
  else if (pct >= 60) { emoji = '😎'; msg = 'Bien joué, continue comme ça !'; }
  else if (pct < 40) { emoji = '📚'; msg = 'Il faut réviser un peu !'; }
  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-score').textContent = score + '/' + total;
  document.getElementById('result-label').textContent = pct + '% de bonnes réponses';
  document.getElementById('result-msg').textContent = msg;
  showScreen('result');
}

function replayCategory() { startCategory(currentCat); }

buildCatGrid();
</script>
